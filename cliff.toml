# git-cliff configuration
# Generates conventional commit changelog in the same markdown format
# that the pkg/changelog parser expects.

[changelog]
header = ""
body = """
# {{ version }}

{% for group, commits in commits | group_by(attribute="group") -%}
### {{ group | upper_first }}

{% for commit in commits -%}
* {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endfor -%}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = true
tag_pattern = "v[0-9].*"
sort_commits = "newest"

[[git.commit_parsers]]
message = "^feat"
group = "Features"

[[git.commit_parsers]]
message = "^fix"
group = "Bug Fixes"

[[git.commit_parsers]]
message = "^perf"
group = "Performance Improvements"

[[git.commit_parsers]]
message = "^refactor"
group = "Other"

[[git.commit_parsers]]
message = "^docs"
group = "Other"

[[git.commit_parsers]]
message = "^style"
group = "Other"

[[git.commit_parsers]]
message = "^test"
skip = true

[[git.commit_parsers]]
message = "^ci"
skip = true

[[git.commit_parsers]]
message = "^chore"
group = "Other"
