name: Documentation
on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # L-6 from docs/development/reports/security-audit-2026-04-17.md —
          # docs build is read-only; deploy-pages uses its own id-token
          # mechanism, not git push, so GITHUB_TOKEN need not persist.
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          # Pinned for hash-pinning stability — see requirements-lock.txt.
          python-version: "3.14"
      # L-7 from docs/development/reports/security-audit-2026-04-17.md —
      # transitive deps pinned by hash via requirements-lock.txt. The
      # runner is a single-use container so plain pip install is
      # sufficient; local dev setups should prefer pipx (see
      # requirements-lock.txt header for the pipx incantation).
      - run: pip install --require-hashes -r requirements-lock.txt
      - run: zensical build --clean
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        id: deployment
