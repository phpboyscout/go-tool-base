# .github/workflows/goreleaser.yml
name: goreleaser

on:
  push:
    tags:
      - "v*"
  pull_request:
    types:
      - "opened"
      - "synchronize"
      - "reopened"
  workflow_dispatch:

# Top-level permissions kept read-only. Write permissions are scoped to
# the goreleaser job.
permissions: read-all

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      # Needed to publish releases and update the release draft.
      contents: write
      # Needed to publish packages.
      packages: write
      # Needed to post PR comments on release failures.
      issues: write
      # Needed for Sigstore/SLSA provenance via OIDC.
      id-token: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: "go-tool-base,homebrew"
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.x
      - name: Install documentation tools
        run: pip install zensical
      - if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: echo "flags=--snapshot" >> $GITHUB_ENV

      - name: Run GoReleaser ${{ env.flags }}
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          APPLE_DEV_CERT: ${{ secrets.APPLE_DEV_CERT }}
          APPLE_DEV_CERT_PASSWORD: ${{ secrets.APPLE_DEV_CERT_PASSWORD }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY }}
          GTB_OTEL_AUTH: ${{ secrets.GTB_OTEL_AUTH }}
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --verbose ${{ env.flags }}

      # Upload PR artifacts if on a PR branch
      - name: Upload PR artifacts
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pr-binaries-${{ github.event.number }}
          path: dist/**
          if-no-files-found: error
          retention-days: 7
