# .github/workflows/goreleaser.yml
name: goreleaser

on:
  push:
    tags:
      - "v*"
  pull_request:
    types:
      - "opened"
      - "synchronize"
      - "reopened"
  workflow_dispatch:

# Top-level permissions kept read-only. Write permissions are scoped to
# the goreleaser job.
permissions: read-all

# H-6 from docs/development/reports/security-audit-2026-04-17.md —
# simultaneous tag pushes (or a quickly re-pushed tag) must queue rather
# than race. cancel-in-progress is false because cancelling an in-flight
# release would leave half-uploaded artefacts.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  goreleaser:
    # Dependabot PRs cannot access repo secrets (their token scope is
    # `secrets: Dependabot`), so the two `create-github-app-token` steps
    # fail with an empty client-id. Goreleaser output isn't useful for
    # dependency bumps anyway — skip entirely for those PRs. The job
    # still runs on regular PRs, on tag pushes, and on workflow_dispatch.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      # Needed to publish releases and update the release draft.
      contents: write
      # Needed to publish packages.
      packages: write
      # Needed to post PR comments on release failures.
      issues: write
      # Needed for Sigstore/SLSA provenance via OIDC.
      id-token: write
    steps:
      # M-7 from docs/development/reports/security-audit-2026-04-17.md —
      # two GitHub App tokens, each scoped to a single repository, so a
      # bug or compromise of goreleaser cannot cross the release repo and
      # the Homebrew tap boundary.
      - name: Generate release-repo GitHub App token
        id: release-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: "go-tool-base"
      - name: Generate Homebrew-tap GitHub App token
        id: homebrew-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: "homebrew"
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.release-token.outputs.token }}
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          # Pinned for hash-pinning stability: PyYAML (transitive of
          # zensical) ships per-python-version binary wheels with
          # distinct hashes. If this changes, regenerate
          # requirements-lock.txt using the recipe documented inside it.
          python-version: "3.14"
      - name: Install documentation tools
        # L-7 from docs/development/reports/security-audit-2026-04-17.md —
        # transitive deps pinned by hash via requirements-lock.txt so a
        # compromised indirect dependency cannot enter the release build
        # silently. The runner is a single-use container so plain pip
        # install is sufficient; local dev setups should prefer pipx
        # (see requirements-lock.txt header for the pipx incantation).
        run: pip install --require-hashes -r requirements-lock.txt
      - if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: echo "flags=--snapshot" >> $GITHUB_ENV

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Run GoReleaser ${{ env.flags }}
        uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7.1.0
        env:
          # GITHUB_TOKEN is scoped to the release repo only. Goreleaser
          # uses it for release uploads and git operations in the working
          # tree.
          GITHUB_TOKEN: ${{ steps.release-token.outputs.token }}
          # HOMEBREW_TAP_GITHUB_TOKEN is scoped to the homebrew repo only.
          # Goreleaser's homebrew_casks block picks this up automatically
          # when present (documented GORELEASER env var).
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ steps.homebrew-token.outputs.token }}
          APPLE_DEV_CERT: ${{ secrets.APPLE_DEV_CERT }}
          APPLE_DEV_CERT_PASSWORD: ${{ secrets.APPLE_DEV_CERT_PASSWORD }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY }}
          GTB_OTEL_AUTH: ${{ secrets.GTB_OTEL_AUTH }}
        with:
          distribution: goreleaser
          # H-5 from docs/development/reports/security-audit-2026-04-17.md —
          # exact version pin so a malicious v2.x release cannot run in the
          # signing workflow. Bump via Renovate PRs with the H-4
          # minimumReleaseAge soak enforcing a 3-day detection window.
          version: "2.10.2"
          args: release --clean --verbose ${{ env.flags }}

      # Upload PR artifacts if on a PR branch
      - name: Upload PR artifacts
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pr-binaries-${{ github.event.number }}
          path: dist/**
          if-no-files-found: error
          retention-days: 7
