name: scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 06:00 UTC

# Top-level permissions must be read-only; the Scorecard action rejects
# workflows that grant write permissions globally. Write permissions are
# scoped to this single job below.
permissions: read-all

jobs:
  scorecard:
    name: scorecard
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the SARIF results to the GitHub Security tab.
      security-events: write
      # Needed for Sigstore keyless signing via OIDC.
      id-token: write
      # Needed to read repository metadata and access default branch settings.
      contents: read
      # Needed for the Branch-Protection check.
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload Scorecard SARIF results
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        with:
          sarif_file: scorecard-results.sarif
          category: "scorecard"
