name: tests
on:
  pull_request:

permissions:
  contents: read
  checks: write

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          args: --timeout=30m

  unit-tests:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: go mod download
        run: go mod download
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -v -coverprofile /tmp/cover.out ./...
      - name: Check coverage threshold
        run: |
          THRESHOLD=65
          COVERAGE=$(go tool cover -func=/tmp/cover.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Current coverage: ${COVERAGE}%"
          echo "Threshold: ${THRESHOLD}%"
          if [ "$(echo "$COVERAGE < $THRESHOLD" | bc -l)" = "1" ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: /tmp/cover.out
          if-no-files-found: error

  race-detection:
    name: race detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: go mod download
        run: go mod download
      - name: go test -race
        run: go test -race ./...

  e2e-tests:
    name: e2e bdd tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: go mod download
        run: go mod download
      - name: Build E2E test binary
        run: go build -o /tmp/gtb-e2e ./cmd/e2e
      - name: Run E2E tests
        run: INT_TEST_E2E=1 go test ./test/e2e/... -v -timeout 5m
