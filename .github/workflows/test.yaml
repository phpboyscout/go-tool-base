name: tests
on:
  pull_request:

# Top-level permissions kept read-only. Write permissions are scoped to
# the individual jobs that require them.
permissions: read-all

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      # Needed by golangci-lint-action to publish check annotations on PRs.
      checks: write
      # Needed for actions/checkout.
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          args: --timeout=30m

  tests:
    name: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: go mod download
        run: go mod download
      - name: go vet
        run: go vet ./...
      - name: Unit tests with race detection and coverage
        run: go test -race -v -coverprofile /tmp/cover.out ./...
      - name: Check coverage threshold
        run: |
          THRESHOLD=65
          COVERAGE=$(go tool cover -func=/tmp/cover.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Current coverage: ${COVERAGE}%"
          echo "Threshold: ${THRESHOLD}%"
          if [ "$(echo "$COVERAGE < $THRESHOLD" | bc -l)" = "1" ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: /tmp/cover.out
          if-no-files-found: error
      - name: Integration tests
        run: INT_TEST=1 go test -race -v ./...

  e2e-tests:
    name: e2e bdd tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: go mod download
        run: go mod download
      - name: Build E2E test binary
        run: go build -o /tmp/gtb-e2e ./cmd/e2e
      - name: Run E2E tests
        run: INT_TEST_E2E=1 go test ./test/e2e/... -v -timeout 5m
