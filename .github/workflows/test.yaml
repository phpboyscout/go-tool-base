name: tests
on:
  pull_request:

# Top-level permissions kept read-only. Write permissions are scoped to
# the individual jobs that require them.
permissions: read-all

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      # Needed by golangci-lint-action to publish check annotations on PRs.
      checks: write
      # Needed for actions/checkout.
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          args: --timeout=30m

  tests:
    name: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
      - name: go mod download
        run: go mod download
      - name: go vet
        run: go vet ./...
      - name: Unit tests with race detection and coverage
        run: go test -race -v -coverprofile /tmp/cover.out ./...
      - name: Check coverage threshold
        # Generated mocks account for ~45% of all functions in the repo
        # with 0% coverage by design, which massively skews the aggregate.
        # Strip any line referencing "/mocks/" from the coverage profile
        # before evaluating the threshold. Preserve the mode line required
        # by go tool cover.
        run: |
          THRESHOLD=60
          head -1 /tmp/cover.out > /tmp/cover-filtered.out
          grep -v "/mocks/" /tmp/cover.out | tail -n +2 >> /tmp/cover-filtered.out
          COVERAGE=$(go tool cover -func=/tmp/cover-filtered.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Current coverage (mocks excluded): ${COVERAGE}%"
          echo "Threshold: ${THRESHOLD}%"
          if [ "$(echo "$COVERAGE < $THRESHOLD" | bc -l)" = "1" ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: coverage-report
          path: /tmp/cover.out
          if-no-files-found: error
      - name: Integration tests
        run: INT_TEST=1 go test -race -v ./...

  e2e-tests:
    name: e2e bdd tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
      - name: go mod download
        run: go mod download
      - name: Build E2E test binary
        run: go build -o /tmp/gtb-e2e ./cmd/e2e
      - name: Run E2E tests
        run: INT_TEST_E2E=1 go test ./test/e2e/... -v -timeout 5m
