# .github/workflows/semantic-release.yml
name: semantic-release

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Top-level permissions kept read-only. Write permissions are scoped to
# the semantic-release job.
permissions: read-all

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    permissions:
      # Needed to push tags, release notes, and changelog commits.
      contents: write
      # Needed to publish npm packages.
      packages: write
      # Needed to comment on released issues/PRs.
      issues: write
      # Needed for OIDC token exchange during npm publish.
      id-token: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            conventional-changelog-conventionalcommits
