goreleaser:
  stage: release
  image:
    name: goreleaser/goreleaser:latest
    entrypoint: [""]
  variables:
    GIT_DEPTH: 0
    GITLAB_TOKEN: $CI_JOB_TOKEN
  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        # Generate changelog before release
        command -v git-cliff >/dev/null 2>&1 && git-cliff --config cliff.toml --output CHANGELOG.md || true
        goreleaser release --clean
      else
        goreleaser release --clean --snapshot
      fi
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  artifacts:
    paths:
      - dist/
    when: on_success
